name: Publish to npm

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if version changed
        id: version
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          PREVIOUS=$(git show HEAD~1:package.json 2>/dev/null | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version" 2>/dev/null || echo "")
          if [ "$CURRENT" != "$PREVIOUS" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.version.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        if: steps.version.outputs.changed == 'true'
        run: npm ci

      - name: Build
        if: steps.version.outputs.changed == 'true'
        run: npm run build

      - name: Test
        if: steps.version.outputs.changed == 'true'
        run: npm test

      - name: Live E2E Tests
        if: steps.version.outputs.changed == 'true'
        run: npm run test:live
        env:
          E1_PLATFORM_SERVICE_TOKEN: ${{ secrets.E1_PLATFORM_SERVICE_TOKEN }}

      - name: Publish
        if: steps.version.outputs.changed == 'true'
        run: npm publish --access public --provenance

      - name: Notify remember-mcp
        if: steps.version.outputs.changed == 'true'
        run: |
          gh api repos/prmichaelsen/remember-mcp/dispatches \
            -f event_type=dependency-update \
            -f "client_payload[package]=@prmichaelsen/remember-core" \
            -f "client_payload[version]=${{ steps.version.outputs.version }}"
        env:
          GH_TOKEN: ${{ secrets.REPO_DISPATCH_TOKEN }}

      - name: Summary
        if: steps.version.outputs.changed == 'true'
        run: echo "Published @prmichaelsen/remember-core@${{ steps.version.outputs.version }} to npm"

      - name: Skip
        if: steps.version.outputs.changed != 'true'
        run: echo "Version unchanged, skipping publish"
