project:
  name: remember-core
  version: 0.48.5
  started: 2026-02-27
  status: in_progress
  current_milestone: M37
  # M14-M19 all completed.
  description: |
    Core SDK for Remember MCP and REST services.
    Extracts transport-agnostic business logic from remember-mcp so both
    remember-mcp-server and remember-rest-server can consume shared services.

milestones:
  - id: M1
    name: Types & Models
    status: in_progress
    progress: 100
    started: 2026-02-27
    completed: 2026-02-27
    estimated_weeks: 1
    tasks_completed: 3
    tasks_total: 3
    notes: |
      Port all type definitions, interfaces, and constants from remember-mcp.

  - id: M2
    name: Database & Configuration
    status: completed
    progress: 100
    started: 2026-02-27
    completed: 2026-02-27
    estimated_weeks: 1
    tasks_completed: 4
    tasks_total: 4
    notes: |
      Port Weaviate/Firestore init, schema, config, and utilities.

  - id: M3
    name: Core Services
    status: completed
    progress: 100
    started: 2026-02-27
    completed: 2026-02-27
    estimated_weeks: 2
    tasks_completed: 4
    tasks_total: 4
    notes: |
      Extract business logic from 20 MCP tool handlers into reusable services.

  - id: M4
    name: Integration & Packaging
    status: completed
    progress: 100
    started: 2026-02-27
    completed: 2026-02-27
    estimated_weeks: 1
    tasks_completed: 4
    tasks_total: 4
    notes: |
      NPM packaging, public API design, integration tests, migration guides.

  - id: M5
    name: Trust & Ghost System
    status: completed
    progress: 100
    started: 2026-02-28
    completed: 2026-02-28
    estimated_weeks: 1
    tasks_completed: 6
    tasks_total: 6
    notes: |
      Extract trust enforcement, access control, and ghost/persona system from
      remember-mcp (v3.9.0-v3.13.0). New types, 6 services, schema updates, tests.

  - id: M6
    name: Ghost/Trust Integration into MemoryService
    status: completed
    progress: 100
    estimated_weeks: 0.5
    tasks_completed: 4
    tasks_total: 4
    started: 2026-02-28
    completed: 2026-02-28
    notes: |
      ✅ Ghost/trust filtering wired into MemoryService search/query/findSimilar.
      ✅ GhostSearchContext type, ghost_context parameter on 3 input types.
      ✅ 11 new unit tests, 281 total (12 suites).
      ✅ Migration guide updated with ghost search examples.
      Unblocks remember-mcp migration of 3 deferred ghost tools.
      See: agent/milestones/milestone-6-ghost-memory-service-integration.md

  - id: M7
    name: Web Client SDK
    status: completed
    progress: 100
    estimated_weeks: 1.5
    tasks_completed: 10
    tasks_total: 10
    started: 2026-02-28
    completed: 2026-02-28
    notes: |
      @prmichaelsen/remember-core/web subpath export.
      Use-case-oriented server-side SDK for web apps.
      31 functions across 6 modules (memories, relationships, spaces, ghost, profiles, preferences).
      Auto-confirmed space operations, searchAsGhost compound, profile compounds.
      Server-side only (browser guard). Framework-agnostic.
      42 new tests across 6 suites (323 total, 18 suites).
      See: agent/milestones/milestone-7-web-client-sdk.md

  - id: M8
    name: Bug Fixes
    status: completed
    progress: 100
    estimated_weeks: 1
    tasks_completed: 1
    tasks_total: 2
    started: 2026-02-28
    notes: |
      Bug fixes. Task 36 (memory search indexing) moved out.
      Task 117: Wire MemoryIndexService into SpaceService + make required
      in MemoryService (root cause of task-116 index lookup returning null).

  - id: M9
    name: Client SDKs (Svc + App)
    status: completed
    progress: 100
    estimated_weeks: 2
    tasks_completed: 10
    tasks_total: 10
    started: 2026-02-28
    completed: 2026-02-28
    notes: |
      Two typed REST client SDKs wrapping remember-rest-service API.
      Svc client: 1:1 mirror of /api/svc/v1/ routes (29 methods).
      App client: use-case compound operations (5 methods).
      Replaces src/web/ (direct-service calls) with REST wrappers.
      Supabase-style { data, error } + .throwOnError().
      Both server-side only. No auto-confirm.
      See: agent/milestones/milestone-9-client-sdks.md

  - id: M10
    name: REM Background Relationships
    status: completed
    progress: 100
    estimated_weeks: 2
    tasks_completed: 8
    tasks_total: 8
    started: 2026-03-02
    completed: 2026-03-02
    notes: |
      REM (Relationship Engine for Memories) — background service that
      auto-discovers and creates relationships using embedding similarity
      and Haiku validation. Runs hourly, one collection per cycle.
      Schema: source field on Relationship type.
      RemService with runCycle() — pure BL, thin Cloud Run wrapper.
      See: agent/milestones/milestone-10-rem-background-relationships.md

  - id: M11
    name: Basic Sort Modes (MVP)
    status: completed
    progress: 100
    completed: 2026-03-03
    estimated_weeks: 1
    tasks_completed: 6
    tasks_total: 6
    started: 2026-03-03
    notes: |
      Implement basic server-side sort modes (Smart, Time, Density) using
      existing Weaviate capabilities. Phase 1 MVP from memory-sorting-algorithms
      design doc. Smart mode already works via hybrid search. Time mode uses
      native Weaviate sort by created_at. Density mode requires relationship_count
      property (denormalized from relationships.length for query performance).
      See: agent/milestones/milestone-11-basic-sort-modes.md
      See: agent/design/memory-sorting-algorithms.md

  - id: M12
    name: Time-Slice Search
    status: completed
    progress: 100
    estimated_weeks: 0.5
    tasks_completed: 3
    tasks_total: 3
    started: 2026-03-03
    completed: 2026-03-03
    notes: |
      Consumer-side utility combining text search with chronological ordering
      via parallel time-bucketed searches. New src/search/ module with
      remember-core/search subpath export. Direction-aware bucketing:
      graded (desc) vs even (asc). No Weaviate schema changes needed.
      See: agent/milestones/milestone-12-time-slice-search.md
      See: agent/design/local.by-time-slice-search.md

  - id: M13
    name: Performance
    status: completed
    progress: 100
    estimated_weeks: 1
    tasks_completed: 1
    tasks_total: 1
    started: 2026-03-04
    completed: 2026-03-05
    notes: |
      Reduce latency on critical hot paths: REM cycle time (~20s → ~5s via
      parallelization), search pipeline (progressive bucket fetching), and
      Weaviate collection initialization (TTL cache). All optimizations
      transparent — no API changes, no schema migrations.
      See: agent/milestones/milestone-13-performance.md

  - id: M14
    name: Import Service
    status: completed
    progress: 100
    estimated_weeks: 1
    tasks_completed: 3
    tasks_total: 3
    started: 2026-03-04
    completed: 2026-03-04
    notes: |
      Bulk memory import service: token-count chunking, batch memory creation,
      HaikuClient summary generation, relationship linking. OpenAPI spec +
      SVC SDK method. No schema migrations needed.
      See: agent/milestones/milestone-14-import-service.md
      See: agent/design/local.import-service.md

  - id: M15
    name: Relationship GUI App Endpoints
    status: completed
    progress: 100
    estimated_weeks: 1
    tasks_completed: 8
    tasks_total: 8
    started: 2026-03-04
    completed: 2026-03-05
    notes: |
      App Client compound endpoints for agentbase.me M46 Relationship GUI.
      Endpoint A: memory + relationship previews. Endpoint B: paginated
      relationship memories. SearchFilters: relationship_ids. Adds
      RelationshipService.getById(), two new App Client resources.
      See: agent/milestones/milestone-15-relationship-gui-app-endpoints.md
      See: agent/design/local.relationship-gui-app-endpoints.md

  - id: M16
    name: Job Tracking System
    status: completed
    progress: 100
    estimated_weeks: 2
    tasks_completed: 6
    tasks_total: 6
    started: 2026-03-04
    completed: 2026-03-04
    notes: |
      Async job infrastructure for long-running operations. Firestore-backed
      state, Cloud Run Jobs execution, REST polling, stepped progress.
      Migrates ImportService to async (202 + job_id). REM migrates from
      hourly round-robin to daily per-collection jobs. Extensible to future
      job types (bulk delete, export, re-indexing, dedup).
      See: agent/milestones/milestone-16-job-tracking-system.md
      See: agent/design/local.job-tracking-system.md

  - id: M17
    name: File Format Extraction
    status: completed
    progress: 100
    estimated_weeks: 2-3
    tasks_completed: 8
    tasks_total: 8
    notes: |
      Pluggable file-to-text extraction pipeline for PDF, DOCX, images (OCR),
      HTML, and structured data. Extractors behind FileExtractor interface with
      ExtractorRegistry. Integration into ImportJobWorker via signed HTTPS URLs.
      Hybrid PDF strategy: unpdf (text-layer) + Google Document AI (scanned).
      DOCX via mammoth + Turndown. Images via Google Vision API.
      See: agent/milestones/milestone-17-file-format-extraction.md
      See: agent/design/local.file-format-extraction.md

  - id: M18
    name: Memory Index Lookup Table
    status: completed
    progress: 100
    estimated_weeks: 1
    tasks_completed: 5
    tasks_total: 5
    started: 2026-03-05
    completed: 2026-03-05
    notes: |
      Firestore lookup table mapping memory UUIDs to Weaviate collection names.
      Replaces MemoryResolutionService 2-try fallback with O(1) index reads.
      MemoryService.getById() folds resolution into the service itself.
      Backfill migration for existing memories. MemoryResolutionService deprecated.
      See: agent/milestones/milestone-18-memory-index-lookup.md
      See: agent/design/local.memory-index-lookup.md

  - id: M19
    name: Trust Level Redesign
    status: completed
    progress: 100
    estimated_weeks: 1
    tasks_completed: 6
    tasks_total: 6
    started: 2026-03-05
    completed: 2026-03-05
    notes: |
      Redesign trust system: invert semantics (higher = more confidential),
      switch float 0-1 to integer 1-5, add named labels (Public/Internal/
      Confidential/Restricted/Secret). Drop escalation penalty, keep
      block-after-3. Remove trust=1.0 existence-only special case.
      Read-time normalization for mixed float/integer data.
      Weaviate data migration script for existing memories.
      Trust validator updated for integer 1-5 scale.
      Design docs updated. 726 tests passing.
      See: agent/milestones/milestone-19-trust-level-redesign.md

  - id: M20
    name: Memory Ratings System
    status: completed
    progress: 100
    estimated_weeks: 1.5
    tasks_completed: 7
    tasks_total: 7
    started: 2026-03-05
    completed: 2026-03-05
    notes: |
      1-5 star rating system on memories with Bayesian aggregation and byRating
      sort mode. RatingService (Firestore individual ratings + Weaviate aggregates),
      byRating sort (native Weaviate sort by rating_bayesian), REST endpoints,
      SVC client methods. Self-rating and ghost-mode prevention.
      See: agent/milestones/milestone-20-memory-ratings-system.md
      See: agent/design/local.memory-ratings.md

  - id: M21
    name: Content Moderation
    status: completed
    progress: 100
    estimated_weeks: 1.5
    tasks_completed: 4
    tasks_total: 4
    started: 2026-03-05
    completed: 2026-03-05
    notes: |
      LLM-based content moderation gate for space publish/revise.
      ModerationService using Haiku for pass/fail classification.
      Blocks: hate speech, extremism, violence incitement, CSAM, self-harm.
      Allows: edgy content, dark humor, political opinions, profanity.
      Fail-closed, in-memory cache, ValidationError propagation.
      See: agent/milestones/milestone-21-content-moderation.md
      See: agent/design/local.content-moderation.md

  - id: M22
    name: Content Hash Deduplication
    status: completed
    progress: 100
    estimated_weeks: 1.5
    tasks_completed: 6
    tasks_total: 6
    started: 2026-03-06
    completed: 2026-03-06
    notes: |
      Source-ID deduplication for aggregate feeds (simplified from content-hash).
      Precedence: space > group > personal. Origin links (original_memory_id)
      for tracking copies. Service-layer dedupe after cross-collection merge.
      API: also_in metadata + dedupe disable parameter.
      Task-124 simplified approach: dropped content_hash, dedupe on original_memory_id only.
      See: agent/milestones/milestone-22-content-hash-dedupe.md
      See: agent/design/local.content-hash-dedupe.md

  - id: M23
    name: GCP Extraction Clients
    status: completed
    progress: 100
    estimated_weeks: 1
    tasks_completed: 3
    tasks_total: 3
    started: 2026-03-06
    completed: 2026-03-06
    dependencies: [M17]
    notes: |
      Factory functions for Google Cloud Vision (image OCR) and Document AI
      (scanned PDF OCR) clients. Implements existing VisionClient and
      DocumentAiClient interfaces. Consumers pass to createDefaultRegistry().
      Task 127 is a cross-project task in remember-rest-service.
      See: agent/milestones/milestone-23-gcp-extraction-clients.md

  - id: M24
    name: Live E2E Test Coverage
    status: completed
    completed: 2026-03-06
    progress: 100
    estimated_weeks: 1
    tasks_completed: 4
    tasks_total: 4
    notes: |
      Expand live e2e test suite to cover all SVC client resources against
      deployed e1 REST service. Tests gate npm publish in CI.
      Current: 3 suites (health, memories, preferences).
      Target: relationships, spaces, trust, sort modes, ratings.
      See: agent/milestones/milestone-24-live-e2e-test-coverage.md

  - id: M25
    name: byDiscovery Sort Mode
    status: completed
    progress: 100
    estimated_weeks: 1
    tasks_completed: 5
    tasks_total: 5
    notes: |
      Algorithmic sort mode that interleaves unrated/underrated memories with
      high-rated ones at a 4:1 ratio to solve the cold-start problem in byRating.
      Strategy: recent (newest unrated first). Scope: spaces, groups, personal.
      See: agent/design/local.by-discovery-sort-mode.md

  - id: M26
    name: App Client Comments Resource
    status: completed
    progress: 100
    estimated_weeks: 0.5
    tasks_completed: 1
    tasks_total: 1
    started: 2026-03-07
    completed: 2026-03-07
    notes: |
      CommentsResource added to app client SDK. createAndPublish() calls
      POST /api/app/v1/spaces/comments. Infers publish destinations from
      parent memory when spaces/groups not provided. UUID fallback for
      composite_id resolution. Live e2e tests added.
      See: agent/milestones/milestone-26-app-client-comments.md

  - id: M27
    name: byRecommendation Sort Mode
    status: completed
    progress: 100
    estimated_weeks: 1.5
    tasks_completed: 6
    tasks_total: 7
    started: 2026-03-07
    completed: 2026-03-07
    notes: |
      Personalized sort mode using vector similarity to user's rating history.
      Builds preference centroid from 4-5 star ratings, subtracts 1-2 star negative signal,
      uses nearVector search. Firestore-cached centroid. Falls back to byDiscovery.
      Tasks 138-142 found already implemented. Task 143 (tests): 37 new tests covering
      vector arithmetic, centroid computation, caching, byRecommendation in MemoryService.
      Task 144 (multi-centroid clustering) deferred.
      See: agent/design/local.by-recommendation-sort-mode.md, clarification-16

  - id: M28
    name: "REM Emotional Weighting: Schema & Scoring"
    status: completed
    progress: 100
    estimated_weeks: 3
    tasks_completed: 8
    tasks_total: 8
    started: 2026-03-07
    completed: 2026-03-07
    notes: |
      Foundation for REM emotional weighting. Adds 37 new Weaviate properties
      (31 dimensions + 3 composites + 2 REM metadata + 1 observation),
      per-dimension Haiku scoring with context gathering, REM Phase 0 integration,
      composite score computation, and byProperty sort mode.
      See: agent/design/local.rem-emotional-weighting.md, clarifications 18-19

  - id: M29
    name: "REM Emotional Weighting: Retroactive Reweighting"
    status: completed
    progress: 100
    estimated_weeks: 1.5
    tasks_completed: 4
    tasks_total: 4
    notes: |
      Three triggers for re-evaluating memory emotional scores based on new context
      (REM cycle, relationship formation, retrieval threshold) plus selective
      re-evaluation via sub-LLM to minimize unnecessary scoring calls.
      See: agent/design/local.rem-emotional-weighting.md, clarifications 18-19

  - id: M30
    name: "REM Emotional Weighting: Abstraction, Pruning & Reconciliation"
    status: completed
    progress: 100
    estimated_weeks: 2
    tasks_completed: 4
    tasks_total: 4
    notes: |
      Advanced REM phases: abstraction (episodic to semantic promotion with
      content_type 'rem'), graduated pruning (decay + soft-delete), trust-level
      flagging (Firestore classifications), and reconciliation (coherence tension).
      See: agent/design/local.rem-emotional-weighting.md, clarifications 18-19

  - id: M31
    name: byBroad & byRandom Sort Modes
    status: completed
    progress: 100
    completed: 2026-03-07
    estimated_weeks: 0.5
    tasks_completed: 3
    tasks_total: 3
    dependencies: [M18]
    notes: |
      Two new search modes. byBroad: massive results with truncated head/mid/tail
      content for scan-and-drill-in. byRandom: random sampling via Firestore memory
      index (enumerate UUIDs, pick N random offsets, batch-fetch from Weaviate).
      Neither follows standard sort-mode-method pattern.
      See: agent/design/local.new-search-tools.md

  - id: M32
    name: Core Mood State
    status: completed
    progress: 100
    completed: 2026-03-07
    estimated_weeks: 1.5
    tasks_completed: 4
    tasks_total: 4
    dependencies: [M28, M10]
    notes: |
      Persistent emotional state register per user in Firestore (users/{user_id}/core/mood).
      6 dimensions (valence, arousal, confidence, social_warmth, coherence, trust),
      pressure system, directional state (motivation/goal/purpose), sub-LLM narration
      (dominant_emotion, color, reasoning). REM cycle updates via drift/decay/narrate.
      Threshold flags for sustained extreme states.
      See: agent/design/core-mood-memory.md

  - id: M33
    name: Retrieval Bias & Significance Scoring
    status: completed
    progress: 100
    estimated_weeks: 1
    tasks_completed: 3
    tasks_total: 3
    dependencies: [M32]
    notes: |
      Wire mood into retrieval (applyMoodBias — post-search reranking with conservative
      multipliers) and memory creation (calculateMemorySignificance — mood-aware initial
      weight). Anticipatory emotion in REM (pattern detection, forward projection, pressure).
      See: agent/design/core-mood-memory.md

  - id: M34
    name: Memory Classification & User Perception
    status: completed
    progress: 100
    completed: 2026-03-07
    estimated_weeks: 1.5
    tasks_completed: 4
    tasks_total: 4
    dependencies: [M32, M10]
    notes: |
      REM-powered memory classification (genre/quality/thematic groups via Haiku + findSimilar,
      duplicate detection, Firestore index at users/{user_id}/core/classifications).
      User perception documents (ghost's model of each user at
      users/{owner_id}/core/perceptions/{target_user_id}, personality sketch,
      communication style, emotional baseline, REM updates).
      See: agent/design/core-mood-memory.md

  - id: M35
    name: SpaceService Sort Modes
    status: completed
    progress: 100
    completed: 2026-03-07
    estimated_weeks: 0.5
    tasks_completed: 3
    tasks_total: 3
    dependencies: [M11, M20, M28, M31]
    notes: |
      Add 5 sort modes to SpaceService (byTime, byRating, byProperty, byBroad,
      byRandom) matching MemoryService equivalents. Cross-collection search +
      dedup, moderation filtering, space/group validation.
      Request from remember-mcp agent — unblocks search_space_by tool stubs.
      See: agent/milestones/milestone-35-space-sort-modes.md

  - id: M36
    name: byCurated Sort Mode
    status: completed
    progress: 100
    completed: 2026-03-07
    estimated_weeks: 3
    tasks_completed: 6
    tasks_total: 6
    dependencies: [M10, M20, M28]
    notes: |
      Hybrid algorithmic sort mode combining 6 quality signals (editorial quality,
      cluster quality, graph centrality, user ratings, recency, engagement) into
      pre-computed curated_score. Updated during REM cycles. Supports browse mode
      (native sort) and search mode (hybrid search re-rank). Unscored interleaving.
      See: agent/design/local.by-curated-sort-mode.md
      See: agent/milestones/milestone-36-by-curated-sort-mode.md

  - id: M37
    name: byMyRatings Sort Mode
    status: not_started
    progress: 0
    estimated_weeks: 2
    tasks_completed: 0
    tasks_total: 6
    dependencies: [M10, M28]
    notes: |
      Personal ratings browse/search mode on RatingService. Firestore-first query:
      read user rating docs → scope/star filter → paginate → hydrate from Weaviate.
      Search mode: hybrid search per collection intersected with rated ID set.
      New { memory, metadata } response envelope. Edge cases: unavailable stubs,
      deleted markers, missing collectionName fallback.
      See: agent/design/local.by-my-ratings-sort-mode.md
      See: agent/milestones/milestone-37-by-my-ratings-sort-mode.md

  - id: M38
    name: Response Envelope Migration
    status: not_started
    progress: 0
    estimated_weeks: 2
    tasks_completed: 0
    tasks_total: 0
    dependencies: [M37]
    notes: |
      Migrate existing by* endpoints (byRating, byDiscovery, byBroad, byRandom,
      byCurated) from flat memories[] response to { memory, metadata } envelope
      pattern established in M37. Placeholder — tasks TBD.
      See: agent/milestones/milestone-38-response-envelope-migration.md

